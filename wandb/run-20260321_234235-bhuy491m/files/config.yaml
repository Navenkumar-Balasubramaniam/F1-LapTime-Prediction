artifacts:
    value:
        model_path: models/model.joblib
        predictions_path: reports/predictions.csv
cleaning:
    value:
        drop_columns:
            - Driver
            - LapNumber
            - time
            - circuitId
            - driverId
            - statusId
            - raceId
            - position_x
            - position_y
            - status
            - AirTemp
        dropna_subset:
            - TyreLife
            - milliseconds
data:
    value:
        processed_path: data/processed/clean.csv
        raw_path: data/raw/f1_all.parquet
features:
    value:
        categorical_onehot:
            - round
            - name
            - constructorId
            - code
            - Compound
            - FreshTyre
        numeric_passthrough:
            - lap
            - grid
            - Stint
            - TyreLife
            - TrackTemp
            - Humidity
            - Pressure
            - Rainfall
            - WindSpeed
            - WindDirection
logging:
    value:
        file_path: logs/pipeline.log
        level: INFO
task:
    value:
        problem_type: regression
        target_column: milliseconds
        test_year: 2023
        year_column: year
training:
    value:
        classification:
            logistic_regression:
                C: 1
                max_iter: 500
                solver: lbfgs
        random_state: 42
        regression:
            cv_folds: 5
            lasso:
                cv: 5
                max_iter: 20000
                n_alphas: 100
                threshold: 0
            linear_regression:
                fit_intercept: true
                n_jobs: null
                positive: false
            random_forest:
                cv: 2
                enabled: true
                grid_search_n_jobs: 1
                n_jobs: 1
                param_grid:
                    model__max_depth:
                        - 3
                        - 5
                    model__min_samples_leaf:
                        - 5
                        - 7
                    model__min_samples_split:
                        - 5
                        - 7
                    model__n_estimators:
                        - 50
            use_lasso_feature_selection: true
wandb:
    value:
        api_key_env: WANDB_API_KEY
        enabled: true
        entity_env: WANDB_ENTITY
        project: mlops-kickoff
        sweep:
            count: 8
            method: grid
            parameters:
                max_depth:
                    values:
                        - null
                        - 10
                        - 20
                min_samples_leaf:
                    values:
                        - 1
                        - 2
                min_samples_split:
                    values:
                        - 2
                        - 5
                n_estimators:
                    values:
                        - 100
                        - 200
        watch_paths:
            reports_dir: reports
