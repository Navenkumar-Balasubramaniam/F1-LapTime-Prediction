name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mlops-student-env
          environment-file: environment.yml
          auto-activate-base: false
          python-version: 3.11

      - name: Show Python version
        shell: bash -l {0}
        run: python --version

      - name: Run tests
        shell: bash -l {0}
        env:
          WANDB_MODE: disabled
        run: pytest -q
